<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Ultra Animated Website</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif;}

body{
background:#0b1020;
color:white;
overflow-x:hidden;
}

/* NAVBAR */
nav{
position:fixed;
top:0;
width:100%;
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 30px;
background:rgba(0,0,0,0.4);
backdrop-filter:blur(10px);
z-index:1000;
}

nav a{
color:white;
margin:0 10px;
text-decoration:none;
}

nav a:hover{color:#7c3aed;}

/* HERO */
header{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
background:linear-gradient(120deg,#1e3a8a,#9333ea,#0ea5e9);
background-size:300% 300%;
animation:gradientMove 10s infinite alternate;
position:relative;
overflow:hidden;
}

@keyframes gradientMove{
0%{background-position:0% 50%;}
100%{background-position:100% 50%;}
}

header h1{
font-size:3rem;
animation:fadeInDown 1s ease;
}

header p{
margin-top:10px;
animation:fadeInUp 1.5s ease;
}

@keyframes fadeInDown{
from{opacity:0;transform:translateY(-40px);}
to{opacity:1;transform:translateY(0);}
}

@keyframes fadeInUp{
from{opacity:0;transform:translateY(40px);}
to{opacity:1;transform:translateY(0);}
}

/* FLOATING ORBS */
.orb{
position:absolute;
border-radius:50%;
background:rgba(255,255,255,0.1);
animation:float 8s infinite ease-in-out;
}

.orb:nth-child(1){width:120px;height:120px;top:20%;left:10%;}
.orb:nth-child(2){width:80px;height:80px;top:60%;left:70%;animation-delay:2s;}
.orb:nth-child(3){width:150px;height:150px;top:40%;left:80%;animation-delay:4s;}

@keyframes float{
0%{transform:translateY(0px);}
50%{transform:translateY(-40px);}
100%{transform:translateY(0px);}
}

/* SECTIONS */
section{
padding:100px 20px;
min-height:100vh;
opacity:0;
transform:translateY(50px);
transition:all 1s ease;
}

section.show{
opacity:1;
transform:translateY(0);
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
margin-top:40px;
}

.card{
background:#111827;
padding:30px;
border-radius:20px;
transition:0.3s;
}

.card:hover{
transform:scale(1.05) translateY(-10px);
box-shadow:0 20px 50px rgba(0,0,0,0.5);
}

footer{
padding:40px;
text-align:center;
background:#020617;
}

/* CURSOR */
.cursor{
position:fixed;
width:20px;
height:20px;
border-radius:50%;
background:white;
mix-blend-mode:difference;
pointer-events:none;
transform:translate(-50%,-50%);
z-index:9999;
}

/* PARTICLES */
canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
}

</style>
</head>
<body>

<canvas id="particles"></canvas>
<div class="cursor" id="cursor"></div>

<nav>
<div><b>MySite</b></div>
<div>
<a href="#home">Home</a>
<a href="#features">Features</a>
<a href="#about">About</a>
</div>
</nav>

<header id="home">
<div class="orb"></div>
<div class="orb"></div>
<div class="orb"></div>
<div>
<h1>Ultra Animated Site</h1>
<p>Scroll, hover, and move your mouse</p>
</div>
</header>

<section id="features">
<h2>Features</h2>
<div class="cards">
<div class="card"><h3>Scroll Animations</h3><p>Sections animate in</p></div>
<div class="card"><h3>Particles</h3><p>Moving background dots</p></div>
<div class="card"><h3>Cursor Effect</h3><p>Custom follower cursor</p></div>
</div>
</section>

<section id="about">
<h2>About</h2>
<p>This page combines CSS + JS animations for a modern feel.</p>
</section>

<footer>Made with HTML, CSS & JS</footer>

<script>
// SCROLL REVEAL
const sections=document.querySelectorAll("section");
window.addEventListener("scroll",()=>{
sections.forEach(sec=>{
const top=sec.getBoundingClientRect().top;
if(top<window.innerHeight-100){sec.classList.add("show");}
});
});

// CURSOR
const cursor=document.getElementById("cursor");
document.addEventListener("mousemove",e=>{
cursor.style.left=e.clientX+"px";
cursor.style.top=e.clientY+"px";
});

// PARTICLES
const canvas=document.getElementById("particles");
const ctx=canvas.getContext("2d");
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let particles=[];
for(let i=0;i<80;i++){
particles.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
vx:(Math.random()-0.5)*1,
vy:(Math.random()-0.5)*1
});
}

function animate(){
ctx.clearRect(0,0,canvas.width,canvas.height);
ctx.fillStyle="white";
particles.forEach(p=>{
p.x+=p.vx;
p.y+=p.vy;
if(p.x<0||p.x>canvas.width)p.vx*=-1;
if(p.y<0||p.y>canvas.height)p.vy*=-1;
ctx.fillRect(p.x,p.y,2,2);
});
requestAnimationFrame(animate);
}
animate();
</script>

</body>
</html>
